
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:400px;
            height:500px;
            max-width:90%;
            background:#fff;
            padding:40px;
            border-radius:22px;
            box-shadow:0 10px 25px rgba(0,0,0,0.4);

            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
        }

        h2{
            text-align:center;
            color:#222;
            margin-bottom:12px;
        }

        p{
            text-align:center;
            color:#666;
            font-size:14px;
            line-height:1.6;
            margin-bottom:30px;
        }

        form{
            width:100%;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            margin-bottom:20px;
            font-size:15px;
            transition:0.3s;
        }

        input:focus{
            border-color:#1470e0;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#0f141a;
            color:#fff;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1470e0;
        }

        .success-message{
            display:none;
            width:100%;
            margin-top:20px;
            padding:12px;
            background:#e8f5e9;
            color:#2e7d32;
            border-radius:8px;
            text-align:center;
            font-size:14px;
        }

        .back-login{
            margin-top:20px;
            text-align:center;
        }

        .back-login a{
            text-decoration:none;
            color:#0f141a;
            font-size:14px;
            font-weight:500;
            transition:0.3s;
        }

        .back-login a:hover{
            color:#1470e0;
            text-decoration:underline;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Forgot Password</h2>

        <p>
            Enter your registered email address.<br>
            We'll send you a password reset link.
        </p>

        <form id="forgotForm">

            <label for="email">Email Address</label>

            <input
                type="email"
                id="email"
                placeholder="example@email.com"
                required
            >

            <button type="submit">
                Send Reset Link
            </button>

        </form>

        <div class="success-message" id="successMessage">
            ✔ If an account exists with this email, a password reset link has been sent.
        </div>

        <div class="back-login">
            <a href="/login">← Back to Login</a>
        </div>

    </div>

    <script>
        document.getElementById("forgotForm").addEventListener("submit", function(e){

            e.preventDefault();

            document.getElementById("successMessage").style.display = "block";

            this.reset();

        });
    </script>

</body>
</html>
