<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account</title>

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{

            background:#f4f4f4;

            display:flex;
            justify-content:center;
            align-items:center;

            min-height:100vh;

            padding:20px;

        }

        .login-container{

            width:100%;
            max-width:420px;

            background:white;

            padding:30px;

            border-radius:22px;

            box-shadow:0 10px 25px rgba(0,0,0,0.08);

        }

        .logo{

            text-align:center;

            margin-bottom:10px;

        }

        .logo img{

            width:72px;
            height:72px;

            object-fit:contain;

        }

        h1{

            text-align:center;

            font-size:28px;

            margin-bottom:6px;

            color:#111;

        }

        .subtitle{

            text-align:center;

            color:gray;

            font-size:14px;

            margin-bottom:24px;

        }

        .input-group{

            position:relative;

            margin-bottom:14px;

        }

        .input-box{

            width:100%;

            padding:14px;

            border:1px solid #ddd;

            border-radius:12px;

            font-size:14px;

            outline:none;

            transition:0.25s ease;

        }

        .input-box:focus{

            border-color:black;

            box-shadow:0 0 0 3px rgba(0,0,0,0.05);

        }

        .toggle-password{

            position:absolute;

            right:14px;

            top:50%;

            transform:translateY(-50%);

            cursor:pointer;

            font-size:14px;

            color:gray;

        }

        .continue-btn{

            width:100%;

            padding:14px;

            background:black;

            color:white;

            border:none;

            border-radius:12px;

            font-size:15px;

            font-weight:600;

            cursor:pointer;

            transition:
                transform 0.25s ease,
                box-shadow 0.25s ease,
                opacity 0.25s ease;

        }

        .continue-btn:hover{

            transform:translateY(-2px);

            box-shadow:
                0 10px 20px rgba(0,0,0,0.15),
                0 0 20px rgba(0,0,0,0.25);

            opacity:0.96;

        }

        .continue-btn:disabled{

            opacity:0.7;

            cursor:not-allowed;

        }

        .divider{

            text-align:center;

            color:gray;

            margin:22px 0;

            font-size:13px;

            position:relative;

        }

        .divider::before,
        .divider::after{

            content:"";

            position:absolute;

            width:38%;

            height:1px;

            background:#ddd;

            top:50%;

        }

        .divider::before{
            left:0;
        }

        .divider::after{
            right:0;
        }

        .social-grid{

            display:grid;

            grid-template-columns:1fr 1fr;

            gap:10px;

        }

        .social-btn{

            padding:12px;

            border:1px solid #ddd;

            background:white;

            border-radius:12px;

            font-size:14px;

            cursor:pointer;

            transition:0.25s;

            display:flex;

            align-items:center;

            justify-content:center;

            gap:10px;

            font-weight:600;

        }

        .social-btn:hover{

            background:#f8f8f8;

            transform:translateY(-2px);

        }

        .social-btn i{

            font-size:18px;

        }

        .more-options{

            text-align:center;

            margin-top:14px;

        }

        .more-options button{

            border:none;

            background:none;

            cursor:pointer;

            color:black;

            font-size:13px;

            font-weight:bold;

        }

        .extra-options{

            display:none;

            margin-top:10px;

        }

        .signup{

            text-align:center;

            margin-top:24px;

            font-size:14px;

        }

        .signup a{

            position:relative;

            text-decoration:none;

            font-weight:bold;

            color:black;

            transition:0.25s ease;

        }

        .signup a:hover{

            color:#2563eb;

        }

        .terms{

            text-align:center;

            font-size:11px;

            color:gray;

            margin-top:18px;

            line-height:1.5;

        }

        .terms a{

            color:#111;

            text-decoration:none;

            font-weight:600;

        }

        .terms a:hover{

            text-decoration:underline;

        }

        .error-message{

            color:red;

            font-size:12px;

            margin-top:-6px;

            margin-bottom:10px;

            display:none;

        }

        @media(max-width:480px){

            .social-grid{
                grid-template-columns:1fr;
            }

            .login-container{
                padding:24px;
            }

        }

    </style>

</head>

<body>

    <div class="login-container">

        <div class="logo">

            <img src="{{ url_for('static', filename='logo.png') }}" alt="logo">

        </div>

        <h1>Create Account</h1>

        <div class="subtitle">
            Start your journey in seconds
        </div>

        <!-- SIGNUP FORM -->

        <form action="/signup" method="POST" id="signupForm">

            <!-- FULL NAME -->

            <div class="input-group">

                <input 
                    type="text"
                    id="fullname"
                    name="fullname"
                    placeholder="Enter your full name"
                    class="input-box"
                    required
                >

            </div>

            <!-- EMAIL -->

            <div class="input-group">

                <input 
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    class="input-box"
                    required
                >

            </div>

            <!-- EMAIL ERROR -->

            <div class="error-message" id="emailError">

                Please enter a valid email

            </div>

            <!-- PASSWORD -->

            <div class="input-group">

                <input 
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Create password"
                    class="input-box"
                    required
                >

                <span class="toggle-password"
                      onclick="togglePassword()">

                    👁

                </span>

            </div>

            <!-- CONFIRM PASSWORD -->

            <div class="input-group">

                <input 
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm password"
                    class="input-box"
                    required
                >

            </div>

            <!-- PASSWORD ERROR -->

            <div class="error-message"
                 id="passwordError">

                Passwords do not match

            </div>

            <!-- CREATE BUTTON -->

            <button type="submit"
                    class="continue-btn"
                    id="createBtn">

                Create Account

            </button>

        </form>

        <!-- DIVIDER -->

        <div class="divider">
            or
        </div>

        <!-- SOCIAL LOGIN -->

        <div class="social-grid">

            <button class="social-btn">

                <i class="fa-brands fa-google"></i>

                Google

            </button>

            <button class="social-btn">

                <i class="fa-brands fa-apple"></i>

                Apple

            </button>

        </div>

        <!-- MORE OPTIONS -->

        <div class="more-options">

            <button onclick="toggleOptions()">
                More options
            </button>

        </div>

        <!-- EXTRA OPTIONS -->

        <div class="extra-options"
             id="extraOptions">

            <div class="social-grid"
                 style="margin-top:12px;">

                <button class="social-btn">

                    <i class="fa-brands fa-microsoft"></i>

                    Microsoft

                </button>

                <button class="social-btn">

                    <i class="fa-brands fa-github"></i>

                    GitHub

                </button>

                <button class="social-btn">

                    <i class="fa-solid fa-key"></i>

                    Passkey

                </button>

                <button class="social-btn">

                    <i class="fa-solid fa-building"></i>

                    Work Account

                </button>

            </div>

        </div>

        <!-- LOGIN LINK -->

        <div class="signup">

            Already have an account?

            <a href="/login">
                Login
            </a>

        </div>

        <!-- TERMS -->

        <div class="terms">

            By creating an account,
            you agree to our

            <a href="/terms">
                Terms
            </a>

            and

            <a href="/privacy">
                Privacy Policy
            </a>.

        </div>

    </div>

    <script>

        function togglePassword(){

            let password =
                document.getElementById("password");

            if(password.type === "password"){

                password.type = "text";

            }
            else{

                password.type = "password";

            }

        }

        function toggleOptions(){

            let options =
                document.getElementById("extraOptions");

            if(options.style.display === "block"){

                options.style.display = "none";

            }
            else{

                options.style.display = "block";

            }

        }

        document
        .getElementById("signupForm")
        .addEventListener("submit", function(event){

            let email =
                document.getElementById("email").value;

            let password =
                document.getElementById("password").value;

            let confirmPassword =
                document.getElementById("confirmPassword").value;

            let emailError =
                document.getElementById("emailError");

            let passwordError =
                document.getElementById("passwordError");

            let createBtn =
                document.getElementById("createBtn");

            let valid = true;

            // EMAIL VALIDATION

            if(!email.includes("@")){

                emailError.style.display = "block";

                valid = false;

            }
            else{

                emailError.style.display = "none";

            }

            // PASSWORD MATCH

            if(password !== confirmPassword){

                passwordError.style.display = "block";

                valid = false;

            }
            else{

                passwordError.style.display = "none";

            }

            // STOP ONLY IF INVALID

            if(!valid){

                event.preventDefault();

                return;

            }

            // BUTTON LOADING

            createBtn.innerText = "Creating...";
            createBtn.disabled = true;

        });

    </script>

</body>

</html>
