<!DOCTYPE html>
<html>
<head>
    <title>Privacy Policy</title>
</head>
<body>

    <h1>Privacy Policy</h1>

    <p>
        Your privacy is important to us.
        We do not share your personal data.
    </p>
    <button 

        onclick="history.back()"

        style="

            display:flex;
            align-items:center;
            gap:8px;

            padding:12px 18px;

            background:black;

            color:white;

            border:none;

            border-radius:14px;

            font-size:14px;

            font-weight:600;

            cursor:pointer;

            box-shadow:0 6px 18px rgba(0,0,0,0.15);

            transition:0.3s ease;

        "

        onmouseover="this.style.transform='translateY(-2px)'; this.style.opacity='0.9'"

        onmouseout="this.style.transform='translateY(0px)'; this.style.opacity='1'"

    >

        ← Back

    </button>
</body>
</html>
